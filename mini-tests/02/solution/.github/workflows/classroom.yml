name: Autograding
on:
    - push
    - workflow_dispatch
    - repository_dispatch
permissions:
    checks: write
    actions: read
    contents: read
jobs:
    run-autograding:
        runs-on: ubuntu-latest
        if: github.actor != 'github-classroom[bot]'
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2

            - name: Install dependencies
              run: bun install

            - name: Run tests
              run: bun index.ts || bun index.js
              if: always()

            - name: Run linter
              run: bun lint
              if: always()

            - name: Run typechecker
              run: bun typecheck
              if: always()

            
